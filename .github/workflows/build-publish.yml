name: Build and Publish

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          IMAGE_NAME="${{ vars.DOCKER_REGISTRY }}/${{ vars.ORGANIZATION }}/${{ vars.DOCKER_IMAGE_NAME }}"
          IMAGE_TAG="${IMAGE_NAME}:$(date +%s)"
          BUILD_NUMBER="${{ github.run_number }}"
          BUILD_DATE="$(date +%m.%d.%Y)"
          REPOSITORY_URL="https://github.com/AdmiralXy/spring-ai-rag-agent"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "REPOSITORY_URL=${REPOSITORY_URL}" >> $GITHUB_ENV
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build the Docker image
        run: |
          docker build \
            --build-arg BUILD_NUMBER="${BUILD_NUMBER}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg REPOSITORY_URL="${REPOSITORY_URL}" \
            -t "${IMAGE_TAG}" .

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.GPR_USER }}
          password: ${{ secrets.GPR_KEY }}

      - name: Push Docker image (versioned + latest)
        run: |
          docker push "${IMAGE_TAG}"
          docker tag "${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"

      - name: Save Docker image to tar.gz
        run: |
          docker save -o agent-ui.tar "${IMAGE_NAME}:latest"
          gzip agent-ui.tar

      - name: Create or update release "Latest"
        run: |
          gh release delete latest -y || true
          gh release create latest agent-ui.tar.gz \
            --title "Latest" \
            --notes "Release build from run ${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
